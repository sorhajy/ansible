- name: Configure system started
  hosts: servers
  tasks:
    - name: Configure system started
      ansible.builtin.include_role:
        name: server-ubuntu
        tasks_from: start


- name: Configure SWAP file on server
  hosts: servers
  tasks:
    - name: Configure SWAP file on server
      ansible.builtin.include_role:
        name: server-ubuntu
        tasks_from: swapfile

- name: Configure base system packages
  hosts: servers
  tasks:
    - name: Configure base system packages
      ansible.builtin.include_role:
        name: server-ubuntu
        tasks_from: base

- name: Configure cron
  hosts: servers
  tasks:
    - name: Configure cron
      ansible.builtin.include_role:
        name: server-ubuntu
        tasks_from: cron

- name: Configure SDK & DevTools
  hosts: servers
  tasks:
    - name: Configure SDK & DevTools
      ansible.builtin.include_role:
        name: server-ubuntu
        tasks_from: sdk

- name: Configure SSH
  hosts: all
  tasks:
    - name: Configure SSH
      ansible.builtin.include_role:
        name: server-ubuntu
        tasks_from: ssh

- name: Install Docker & Docker-compose from official repo
  hosts: servers
  tasks:
    - name: Install Docker & Docker-compose from official repo
      ansible.builtin.include_role:
        name: server-ubuntu
        tasks_from: docker

- name: Configure Docker Swarm
  hosts: swarm
  tasks:
    - name: Configure Docker Swarm
      ansible.builtin.include_role:
        name: server-ubuntu
        tasks_from: docker-swarm

# # - name: Install & configure GitLab-runner packages
