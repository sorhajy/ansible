- name: Install DevTools
  become: true
  ansible.builtin.apt:
    name: "{{ packages }}"
    state: present
  vars:
    packages:
      # - ansible
      # - build-essential
      - git
      - watch
      # - ninja-build
      # - libblkid-dev
      # - liblzma-dev
      # - libsasl2-dev
      # - libldap2-dev
      # - libssl-dev
      - python3
      - python3-pip
      - python3-venv
      # - python3-dev
      - python3-pexpect
      # - python2-dev
      # - pipenv
      # - virtualenv
      # - make

- name: Update pip
  become: true
  ignore_errors: true
  ansible.builtin.pip:
    name:
      - pip
    state: latest

