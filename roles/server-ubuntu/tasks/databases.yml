- name: Create non-privileged database user
  become: true
  ansible.builtin.user:
    name: "{{ database_user }}"
    password_lock: true
    state: present
    shell: /bin/bash
    system: false
    createhome: true
    home: "/home/{{ database_user }}"

- name: Check user SSH dir
  become: true
  ansible.builtin.file:
    path: "/home/{{ database_user }}/.ssh"
    state: directory
    owner: "{{ database_user }}"
    group: "{{ database_user }}"
    mode: "0775"

- name: Inspect user authorized_keys
  become: true
  ansible.builtin.file:
    path: "/home/{{ database_user }}/.ssh/authorized_keys"
    state: touch
    force: false
    owner: "{{ database_user }}"
    group: "{{ database_user }}"
    mode: "0664"

- name: Inspect user ssh-config
  become: true
  ansible.builtin.file:
    path: "/home/{{ database_user }}/.ssh/config"
    state: touch
    force: false
    owner: "{{ database_user }}"
    group: "{{ database_user }}"
    mode: "0664"

- name: Inspect user SSH key
  become: true
  community.crypto.openssh_keypair:
    path: "/home/{{ database_user }}/.ssh/id_rsa"
    type: rsa
    size: 4096
    state: present
    force: false
    owner: "{{ database_user }}"
    group: "{{ database_user }}"
    mode: "0600"
