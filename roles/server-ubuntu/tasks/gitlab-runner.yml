- name: Check GitLab GPG key
  become: true
  ansible.builtin.apt_key:
    url: "https://packages.gitlab.com/gpg.key"
    state: present

- name: Add gitlab runner repo
  become: true
  ansible.builtin.shell: curl -L "https://packages.gitlab.com/install/repositories/runner/gitlab-runner/script.deb.sh" | sudo bash
  args:
    creates: /usr/bin/gitlab-runner

- name: Install gitlab-runner
  become: true
  ansible.builtin.apt:
    name: gitlab-runner
    state: present

- name: Add gitlab-runner user to docker group
  become: true
  ansible.builtin.user:
    name: gitlab-runner
    append: true
    groups: docker
