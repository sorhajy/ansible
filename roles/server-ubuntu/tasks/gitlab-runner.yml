- name: Ensure /etc/sudoers.d directory exists
  ansible.builtin.file:
    path: /etc/sudoers.d
    state: directory
    owner: root
    group: root
    mode: '0750'

- name: Add sudoers rule for gitlab-runner
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/gitlab-runner
    state: present
    create: true
    owner: root
    group: root
    mode: '0440'
    line: "gitlab-runner ALL=(root) NOPASSWD: /usr/sbin/service"
    validate: '/usr/sbin/visudo -cf %s'

