- name: Check root SSH dir
  become: true
  ansible.builtin.file:
    path: "/root/.ssh"
    state: directory
    owner: root
    group: root
    mode: "700"

- name: Inspect root SSH key
  become: true
  community.crypto.openssh_keypair:
    path: "/root/.ssh/id_rsa"
    type: rsa
    size: 4096
    state: present
    force: false

