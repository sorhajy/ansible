- name: Ensure Root PasswordAuthentication is set to prohibit-password
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin prohibit-password'
    state: present

- name: Ensure StrictModes is set to yes
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?StrictModes'
    line: 'StrictModes yes'
    state: present

- name: Ensure MaxAuthTries is set to 2
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?MaxAuthTries'
    line: 'MaxAuthTries 2'
    state: present

- name: Ensure PasswordAuthentication is set to no
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
    state: present

- name: Ensure PermitEmptyPasswords is set to no
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitEmptyPasswords'
    line: 'PermitEmptyPasswords no'
    state: present

- name: Ensure ChallengeResponseAuthentication is set to no
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?ChallengeResponseAuthentication'
    line: 'ChallengeResponseAuthentication no'
    state: present

- name: Reload SSH service to apply changes
  ignore_errors: true
  ansible.builtin.service:
    name: ssh
    state: reloaded
    enabled: true

- name: Reload SSH service to apply changes
  ignore_errors: true
  ansible.builtin.service:
    name: sshd
    state: reloaded
    enabled: true


- name: Deploy authorized_keys file for each user
  ignore_errors: true
  ansible.builtin.template:
    src: ./roles/server-ubuntu/templates/ssh/authorized_keys.j2
    dest: "/home/{{ item.key }}/.ssh/authorized_keys"
    mode: '0400'
    owner: "{{ item.key }}"
    group: "{{ item.key }}"
  loop: "{{ public_keys | dict2items }}"
  vars:
    ssh_keys: "{{ item.value | default([]) }}"

- name: Add public keys to authorized_keys
  ignore_errors: true
  ansible.builtin.authorized_key:
    user: "{{ item.key }}"
    state: present
    key: "{{ item.value | join('\n') }}"
  loop: "{{ additional_public_keys | default({}) | dict2items }}"
  loop_control:
    label: "{{ item.key | default([]) }}"


- name: Retrieve non-system local users from /etc/passwd
  ansible.builtin.getent:
    database: passwd
  register: passwd_data
- name: Get list of non-system users
  ansible.builtin.command: >-
    awk -F: '($3>=1000)&&($1!="nobody"){print $1}' /etc/passwd
  register: local_users

- name: Remove revoked SSH key from authorized_keys for root
  ansible.builtin.authorized_key:
    user: root
    state: absent
    key: "{{ item }}"
  loop: "{{ revoked_public_keys }}"
- name: Remove revoked SSH key from authorized_keys for all non-system users
  ansible.builtin.authorized_key:
    user: "{{ item[0] }}"
    state: absent
    key: "{{ item[1] }}"
  loop: "{{ local_users.stdout_lines | product(revoked_public_keys) | list }}"
