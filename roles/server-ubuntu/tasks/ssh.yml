- name: Deploy authorized_keys file for root
  ansible.builtin.template:
    src: ./roles/server-ubuntu/templates/ssh/root_authorized_keys.j2
    dest: /root/.ssh/authorized_keys
    mode: '0600'

- name: Add public keys from group_vars to root
  ansible.builtin.authorized_key:
    user: root
    state: present
    key: "{{ item }}"
  loop: "{{ additional_root_public_keys | default([]) }}"

- name: Create non-privileged user
  become: true
  ansible.builtin.user:
    name: "{{ server_user }}"
    password_lock: true
    state: present
    shell: /bin/bash
    system: false
    createhome: true
    home: "/home/{{ server_user }}"

- name: Check user SSH dir
  become: true
  ansible.builtin.file:
    path: "/home/{{ server_user }}/.ssh"
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0775"

- name: Inspect user authorized_keys
  become: true
  ansible.builtin.file:
    path: "/home/{{ server_user }}/.ssh/authorized_keys"
    state: touch
    force: false
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0664"

- name: Inspect user ssh-config
  become: true
  ansible.builtin.file:
    path: "/home/{{ server_user }}/.ssh/config"
    state: touch
    force: false
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0664"

- name: Inspect user SSH key
  become: true
  community.crypto.openssh_keypair:
    path: "/home/{{ server_user }}/.ssh/id_rsa"
    type: rsa
    size: 4096
    state: present
    force: false
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0600"

