- name: Add Docker GPG key
  become: true
  ansible.builtin.apt_key:
    url: "https://download.docker.com/linux/ubuntu/gpg"
    state: present
- name: Add Docker repo
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker packages
  become: true
  ansible.builtin.apt:
    name: "{{ packages }}"
    state: present
    update_cache: true
  vars:
    packages:
      - docker-ce-cli
      - docker-ce
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin

- name: Enable & start Docker service
  become: true
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Create non-privileged docker user
  become: true
  ansible.builtin.user:
    name: "{{ docker_user }}"
    password_lock: true
    state: present
    shell: /bin/bash
    system: false
    createhome: true
    home: "/home/{{ docker_user }}"

- name: Check user SSH dir
  become: true
  ansible.builtin.file:
    path: "/home/{{ docker_user }}/.ssh"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0775"

- name: Inspect user authorized_keys
  become: true
  ansible.builtin.file:
    path: "/home/{{ docker_user }}/.ssh/authorized_keys"
    state: touch
    force: false
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0664"

- name: Inspect user ssh-config
  become: true
  ansible.builtin.file:
    path: "/home/{{ docker_user }}/.ssh/config"
    state: touch
    force: false
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0664"

- name: Inspect user SSH key
  become: true
  community.crypto.openssh_keypair:
    path: "/home/{{ docker_user }}/.ssh/id_rsa"
    type: rsa
    size: 4096
    state: present
    force: false
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0600"

- name: Add the user Docker groups
  become: true
  ansible.builtin.user:
    name: "{{ docker_user }}"
    groups: docker
    append: true
